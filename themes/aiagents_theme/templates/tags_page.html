{% extends "base.html" %}

{% block content %}
  <section class="rounded-2xl border border-slate-200/70 bg-white/80 p-6 dark:border-slate-800/70 dark:bg-slate-900/40 md:p-8">
    <h1 class="text-3xl font-bold tracking-tight sm:text-4xl">{{ page.title }}</h1>
    {% if page.summary %}
      <p class="mt-2 text-sm text-slate-600 dark:text-slate-300">{{ page.summary|striptags }}</p>
    {% endif %}
  </section>

  <section class="mt-8 rounded-2xl border border-slate-200/70 bg-white p-5 dark:border-slate-800/70 dark:bg-slate-900/40">
    <div class="flex flex-wrap gap-2">
      {% for tag, tagged_articles in tags %}
        <a href="/tag/{{ tag.slug }}/" class="rounded-full border border-slate-300 px-3 py-1 text-sm transition-colors duration-200 hover:border-indigo-400 hover:text-indigo-700 dark:border-slate-700 dark:hover:border-indigo-500 dark:hover:text-indigo-300">
          #{{ tag.name|replace('[','')|replace(']','') }} <span class="text-xs text-slate-500">({{ tagged_articles|count }})</span>
        </a>
      {% endfor %}
    </div>
  </section>
{% endblock %}
