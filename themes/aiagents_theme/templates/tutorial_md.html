{% extends "base.html" %}

{% block content %}
  <article class="mx-auto max-w-4xl">
    <a class="text-sm text-slate-600 dark:text-slate-400 hover:underline underline-offset-4" href="/{{ article.lang }}/tutorials/">
      ← Back to Tutorials
    </a>

    <h1 class="mt-4 text-3xl font-bold tracking-tight sm:text-4xl">{{ article.title }}</h1>

    <div class="mt-4 flex flex-wrap items-center gap-2 text-xs">
      <span class="rounded-lg bg-indigo-50 px-2 py-1 font-medium text-indigo-700 dark:bg-indigo-900/30 dark:text-indigo-200">Tutorial</span>
      {% if article.difficulty %}
        <span class="rounded-lg bg-emerald-50 px-2 py-1 font-medium text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-200">Difficulty: {{ article.difficulty }}</span>
      {% endif %}
      {% for tag in article.tags %}
        <a href="/tag/{{ tag.slug }}/" class="rounded-lg bg-cyan-50 px-2 py-1 font-medium text-cyan-700 hover:underline underline-offset-4 dark:bg-cyan-900/30 dark:text-cyan-200">{{ tag|replace('[','')|replace(']','') }}</a>
      {% endfor %}
    </div>

    <div id="tutorial-content" class="prose prose-slate dark:prose-invert mt-8 max-w-none prose-pre:rounded-xl prose-pre:border prose-pre:border-slate-700 prose-pre:bg-slate-950 prose-pre:p-4 prose-pre:text-slate-100 prose-code:before:content-none prose-code:after:content-none">
      {{ article.content }}
    </div>
  </article>

  <script>
    (function () {
      const root = document.getElementById("tutorial-content");
      if (!root) return;
      const pres = root.querySelectorAll("pre");
      pres.forEach((pre) => {
        if (pre.dataset.copyReady === "1") return;
        pre.dataset.copyReady = "1";
        pre.classList.add("relative", "pt-10");

        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "absolute right-2 top-2 rounded-md border border-white/20 bg-white/10 px-2 py-1 text-[11px] font-medium text-slate-100 hover:bg-white/20";
        btn.textContent = "Copy";
        btn.setAttribute("aria-label", "Copy code");
        btn.addEventListener("click", async () => {
          const code = pre.innerText || "";
          try {
            await navigator.clipboard.writeText(code);
            btn.textContent = "Copied";
            setTimeout(() => { btn.textContent = "Copy"; }, 1200);
          } catch (_) {
            btn.textContent = "Failed";
            setTimeout(() => { btn.textContent = "Copy"; }, 1200);
          }
        });
        pre.appendChild(btn);
      });
    })();
  </script>
{% endblock %}
